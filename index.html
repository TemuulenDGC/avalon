<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVALON // TACTICAL OS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="header-box">
                <h1>AVALON v2.1.0</h1>
                <div class="status-dot"></div> ONLINE
            </div>

            <div class="operator-card">
                <div class="label">OPERATOR</div>
                <div class="rank">JUNIOR SERGEANT</div>
                <div class="user">TEMUULEN DGC</div>
                <div class="clearance">CLEARANCE: LEVEL 3</div>
            </div>

            <div class="metrics">
                <div class="metric-item">
                    <label>CPU LOAD</label>
                    <div class="bar-bg"><div class="bar-fill" id="cpuBar" style="width: 42%;"></div></div>
                </div>
                <div class="metric-item">
                    <label>NETWORK</label>
                    <div class="bar-bg"><div class="bar-fill" id="netBar" style="width: 18%;"></div></div>
                </div>
            </div>
        </aside>

        <main class="terminal-container">
            <div class="terminal-header">SECURITY_ANALYSIS_TERMINAL.EXE</div>
            <div id="terminalContent" class="terminal-content">
                <div class="line">SYSTEM INITIALIZED...</div>
                <div class="line">ENCRYPTION PROTOCOLS ACTIVE.</div>
                <div class="line">TYPE 'HELP' FOR COMMANDS.</div>
            </div>
            <div class="input-area">
                <span class="prompt">>></span>
                <input type="text" id="terminalInput" autofocus placeholder="ENTER COMMAND...">
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
